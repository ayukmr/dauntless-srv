<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>DauntlessVision</title>

        <link rel="icon" href="icon.png">

        <link rel="stylesheet" href="https://raven.ayukmr.com/raven.css">
        <link rel="stylesheet" href="styles.css">

        <script src="src/main.js" type="module" defer></script>
    </head>

    <body>
        <main>
            <header>
                <img src="header.svg"></img>

                <div class="alert">
                    <h3>&middot;</h3>
                    <h3 class="message">Disconnected</h3>
                </div>
            </header>

            <section>
                <div>
                    <h3 id="info">
                        <span><span id="fps"></span> FPS</span>
                        <span id="res">200×200</span>
                    </h3>
                    <canvas id="frame"></canvas>
                </div>

                <div>
                    <h3>Mask</h3>
                    <canvas id="mask"></canvas>
                </div>
            </section>

            <section>
                <div>
                    <h3>Tags</h3>
                    <canvas id="tags"></canvas>
                </div>

                <div>
                    <h3>Detections</h3>

                    <div id="detections"></div>
                </div>
            </section>

            <div>
                <h3>Settings</h3>

                <section id="settings">
                    <div>
                        <label>Hysteresis Low</label>
                        <input type="number" name="hyst_low"></input>
                    </div>

                    <div>
                        <label>Hysteresis High</label>
                        <input type="number" name="hyst_high"></input>
                    </div>

                    <div>
                        <label>Defaults</label>
                        <button id="reset">Reset</button>
                    </div>
                </section>
            </div>
        </main>
    </body>
</html>
